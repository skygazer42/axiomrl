<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
  <title>AxiomRL Architecture (dark)</title>
  <defs>
    <linearGradient id="zooD" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="contribD" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="coreD" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="envD" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <marker id="arrowD" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="14" fill="#0B1220"/>
  <rect x="1" y="1" width="878" height="518" rx="13" fill="none" stroke="#1E293B"/>

  <text x="440" y="38" text-anchor="middle" fill="#F1F5F9" font-size="20" font-weight="700">AxiomRL · Three-Layer Architecture</text>
  <text x="440" y="58" text-anchor="middle" fill="#94A3B8" font-size="12">Each layer builds on the one below — Zoo → Contrib → Core → Environments</text>

  <rect x="40" y="78" width="800" height="44" rx="10" fill="#1E293B"/>
  <text x="60" y="105" fill="#94A3B8" font-size="11" font-weight="700" letter-spacing="2">CLI</text>
  <g fill="#E2E8F0" font-size="13" font-weight="500" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="180" y="105">axiomrl train</text>
    <text x="320" y="105">axiomrl eval</text>
    <text x="460" y="105">axiomrl resume</text>
    <text x="610" y="105">axiomrl zoo</text>
    <text x="730" y="105">axiomrl tune</text>
  </g>
  <path d="M440 122 L440 138" stroke="#64748B" stroke-width="2" marker-end="url(#arrowD)"/>

  <rect x="40" y="142" width="800" height="58" rx="10" fill="url(#zooD)" opacity="0.92"/>
  <text x="64" y="168" fill="#0B1220" font-size="15" font-weight="700">Zoo</text>
  <text x="64" y="186" fill="#1F2937" font-size="11">Presets · Benchmarks · Recipes</text>
  <g fill="#1F2937" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="260" y="170">zoo/atari/dqn_breakout.yaml</text>
    <text x="260" y="187">zoo/atari/ppo_breakout.yaml</text>
    <text x="540" y="170">zoo/mujoco/sac_halfcheetah.yaml</text>
    <text x="540" y="187">zoo/atari/benchmark.yaml</text>
  </g>
  <path d="M440 200 L440 216" stroke="#64748B" stroke-width="2" marker-end="url(#arrowD)"/>

  <rect x="40" y="220" width="800" height="50" rx="10" fill="url(#contribD)" opacity="0.92"/>
  <text x="64" y="246" fill="#0B1220" font-size="15" font-weight="700">Contrib</text>
  <text x="64" y="262" fill="#1F2937" font-size="11">Experimental extensions beyond the stable core</text>
  <g fill="#1F2937" font-size="12">
    <text x="500" y="248">RecurrentPPO (LSTM)</text>
    <text x="500" y="264">GAIL · Future extensions…</text>
  </g>
  <path d="M440 270 L440 286" stroke="#64748B" stroke-width="2" marker-end="url(#arrowD)"/>

  <rect x="40" y="290" width="800" height="160" rx="10" fill="url(#coreD)" opacity="0.92"/>
  <text x="64" y="316" fill="#0B1220" font-size="15" font-weight="700">Core</text>
  <text x="64" y="332" fill="#1E3A8A" font-size="11">Stable train / eval / resume — semver-governed surface</text>

  <g>
    <rect x="60" y="346" width="148" height="86" rx="8" fill="#0B1220" opacity="0.45"/>
    <text x="134" y="370" text-anchor="middle" fill="#F8FAFC" font-size="12" font-weight="700">Algorithms</text>
    <text x="134" y="390" text-anchor="middle" fill="#DBEAFE" font-size="10">PPO · DQN · SAC · TD3</text>
    <text x="134" y="406" text-anchor="middle" fill="#DBEAFE" font-size="10">BC · IQL · CQL · HER</text>
    <text x="134" y="422" text-anchor="middle" fill="#BFDBFE" font-size="10" font-style="italic">80+ implementations</text>

    <rect x="220" y="346" width="148" height="86" rx="8" fill="#0B1220" opacity="0.45"/>
    <text x="294" y="370" text-anchor="middle" fill="#F8FAFC" font-size="12" font-weight="700">Models</text>
    <text x="294" y="390" text-anchor="middle" fill="#DBEAFE" font-size="10">MLP · CNN · LSTM</text>
    <text x="294" y="406" text-anchor="middle" fill="#DBEAFE" font-size="10">NatureCNN · Encoders</text>
    <text x="294" y="422" text-anchor="middle" fill="#BFDBFE" font-size="10" font-style="italic">Pluggable nets</text>

    <rect x="380" y="346" width="148" height="86" rx="8" fill="#0B1220" opacity="0.45"/>
    <text x="454" y="370" text-anchor="middle" fill="#F8FAFC" font-size="12" font-weight="700">Data</text>
    <text x="454" y="390" text-anchor="middle" fill="#DBEAFE" font-size="10">ReplayBuffer · Rollout</text>
    <text x="454" y="406" text-anchor="middle" fill="#DBEAFE" font-size="10">HER · Prioritized · NPZ</text>
    <text x="454" y="422" text-anchor="middle" fill="#BFDBFE" font-size="10" font-style="italic">Buffers &amp; datasets</text>

    <rect x="540" y="346" width="148" height="86" rx="8" fill="#0B1220" opacity="0.45"/>
    <text x="614" y="370" text-anchor="middle" fill="#F8FAFC" font-size="12" font-weight="700">Runtime</text>
    <text x="614" y="390" text-anchor="middle" fill="#DBEAFE" font-size="10">Trainer · Evaluator</text>
    <text x="614" y="406" text-anchor="middle" fill="#DBEAFE" font-size="10">Collector · Schedulers</text>
    <text x="614" y="422" text-anchor="middle" fill="#BFDBFE" font-size="10" font-style="italic">Loop orchestration</text>

    <rect x="700" y="346" width="120" height="86" rx="8" fill="#0B1220" opacity="0.45"/>
    <text x="760" y="370" text-anchor="middle" fill="#F8FAFC" font-size="12" font-weight="700">Experiment</text>
    <text x="760" y="390" text-anchor="middle" fill="#DBEAFE" font-size="10">Config · Logging</text>
    <text x="760" y="406" text-anchor="middle" fill="#DBEAFE" font-size="10">Checkpoint · Seed</text>
    <text x="760" y="422" text-anchor="middle" fill="#BFDBFE" font-size="10" font-style="italic">Reproducibility</text>
  </g>
  <path d="M440 450 L440 466" stroke="#64748B" stroke-width="2" marker-end="url(#arrowD)"/>

  <rect x="40" y="470" width="800" height="36" rx="8" fill="url(#envD)" opacity="0.92"/>
  <text x="64" y="493" fill="#0B1220" font-size="12" font-weight="700">Environments</text>
  <text x="180" y="493" fill="#064E3B" font-size="11">Gymnasium · VecEnv · Atari · Pixel · GoalEnv · Reward Transforms</text>
</svg>
