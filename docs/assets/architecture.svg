<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="contribGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="zooGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="infraGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">AxiomRL  Architecture</text>

  <!-- CLI Layer -->
  <rect x="40" y="60" width="720" height="50" rx="8" fill="#334155" filter="url(#shadow)"/>
  <text x="400" y="82" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">CLI  LAYER</text>
  <text x="160" y="100" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500">axiomrl train</text>
  <text x="340" y="100" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500">axiomrl eval</text>
  <text x="500" y="100" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500">axiomrl resume</text>
  <text x="660" y="100" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500">axiomrl zoo</text>

  <!-- Arrow -->
  <path d="M400 110 L400 128" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#64748b"/></marker></defs>

  <!-- Zoo Layer -->
  <rect x="40" y="130" width="720" height="70" rx="8" fill="url(#zooGrad)" opacity="0.9" filter="url(#shadow)"/>
  <text x="80" y="155" fill="#fffbeb" font-size="14" font-weight="700">Zoo</text>
  <text x="80" y="175" fill="#fef3c7" font-size="11">Presets</text>
  <text x="80" y="190" fill="#fef3c7" font-size="11">Benchmarks &amp; Recipes</text>
  <rect x="240" y="140" width="1" height="50" fill="#fef3c7" opacity="0.3"/>
  <text x="260" y="160" fill="#fef3c7" font-size="11">zoo/atari/dqn_breakout.yaml</text>
  <text x="260" y="178" fill="#fef3c7" font-size="11">zoo/atari/ppo_breakout.yaml</text>
  <text x="260" y="193" fill="#fef3c7" font-size="11">zoo/atari/benchmark.yaml</text>
  <rect x="520" y="140" width="1" height="50" fill="#fef3c7" opacity="0.3"/>
  <text x="540" y="160" fill="#fef3c7" font-size="11">Hyperparameter presets</text>
  <text x="540" y="178" fill="#fef3c7" font-size="11">Reproducible launch configs</text>

  <!-- Arrow -->
  <path d="M400 200 L400 218" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Contrib Layer -->
  <rect x="40" y="220" width="720" height="60" rx="8" fill="url(#contribGrad)" opacity="0.9" filter="url(#shadow)"/>
  <text x="80" y="248" fill="#f5f3ff" font-size="14" font-weight="700">Contrib</text>
  <text x="80" y="268" fill="#ede9fe" font-size="11">Experimental extensions</text>
  <rect x="250" y="232" width="1" height="38" fill="#ede9fe" opacity="0.3"/>
  <text x="270" y="252" fill="#ede9fe" font-size="12">RecurrentPPO</text>
  <text x="420" y="252" fill="#ede9fe" font-size="12">GAIL</text>
  <text x="540" y="252" fill="#ede9fe" font-size="12">Future extensions...</text>
  <text x="270" y="270" fill="#c4b5fd" font-size="10">Recurrent &amp; advanced algorithms that add complexity beyond core</text>

  <!-- Arrow -->
  <path d="M400 280 L400 298" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Core Layer (largest) -->
  <rect x="40" y="300" width="720" height="200" rx="8" fill="url(#coreGrad)" opacity="0.9" filter="url(#shadow)"/>
  <text x="80" y="328" fill="#eff6ff" font-size="16" font-weight="700">Core</text>

  <!-- Sub-modules in Core -->
  <rect x="60" y="340" width="160" height="68" rx="6" fill="#1e40af" opacity="0.6"/>
  <text x="140" y="362" text-anchor="middle" fill="#bfdbfe" font-size="12" font-weight="600">Algorithms</text>
  <text x="140" y="378" text-anchor="middle" fill="#93c5fd" font-size="10">PPO � DQN � SAC � TD3</text>
  <text x="140" y="392" text-anchor="middle" fill="#93c5fd" font-size="10">BC � IQL � CQL � HER ...</text>

  <rect x="235" y="340" width="130" height="68" rx="6" fill="#1e40af" opacity="0.6"/>
  <text x="300" y="362" text-anchor="middle" fill="#bfdbfe" font-size="12" font-weight="600">Models</text>
  <text x="300" y="378" text-anchor="middle" fill="#93c5fd" font-size="10">MLP � CNN � LSTM</text>
  <text x="300" y="392" text-anchor="middle" fill="#93c5fd" font-size="10">NatureCNN � Encoder</text>

  <rect x="380" y="340" width="130" height="68" rx="6" fill="#1e40af" opacity="0.6"/>
  <text x="445" y="362" text-anchor="middle" fill="#bfdbfe" font-size="12" font-weight="600">Data</text>
  <text x="445" y="378" text-anchor="middle" fill="#93c5fd" font-size="10">ReplayBuffer</text>
  <text x="445" y="392" text-anchor="middle" fill="#93c5fd" font-size="10">RolloutBuffer � HER</text>

  <rect x="525" y="340" width="105" height="68" rx="6" fill="#1e40af" opacity="0.6"/>
  <text x="577" y="362" text-anchor="middle" fill="#bfdbfe" font-size="12" font-weight="600">Runtime</text>
  <text x="577" y="378" text-anchor="middle" fill="#93c5fd" font-size="10">Trainer � Evaluator</text>
  <text x="577" y="392" text-anchor="middle" fill="#93c5fd" font-size="10">Collector</text>

  <rect x="645" y="340" width="100" height="68" rx="6" fill="#1e40af" opacity="0.6"/>
  <text x="695" y="362" text-anchor="middle" fill="#bfdbfe" font-size="12" font-weight="600">Experiment</text>
  <text x="695" y="378" text-anchor="middle" fill="#93c5fd" font-size="10">Config � Logging</text>
  <text x="695" y="392" text-anchor="middle" fill="#93c5fd" font-size="10">Checkpoint</text>

  <!-- Env layer inside core -->
  <rect x="60" y="420" width="685" height="34" rx="6" fill="url(#infraGrad)" opacity="0.7"/>
  <text x="400" y="442" text-anchor="middle" fill="#ecfdf5" font-size="12" font-weight="600">Environments  �  Gymnasium  �  VecEnv  �  Atari Wrappers  �  Pixel Wrappers  �  GoalEnv  �  Reward Transforms</text>

  <!-- Bottom info -->
  <text x="400" y="485" text-anchor="middle" fill="#64748b" font-size="11" font-weight="500">PyTorch  �  Gymnasium  �  TensorBoard  �  YAML Config  �  Python 3.10+</text>
  <text x="400" y="508" text-anchor="middle" fill="#475569" font-size="10">Each layer builds on the one below  Zoo � Contrib � Core � Environments</text>
</svg>
