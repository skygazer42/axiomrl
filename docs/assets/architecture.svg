<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
  <title>AxiomRL Architecture</title>
  <defs>
    <linearGradient id="zoo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="contrib" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="env" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" rx="14" fill="#F8FAFC"/>
  <rect x="1" y="1" width="878" height="518" rx="13" fill="none" stroke="#E2E8F0"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" fill="#0F172A" font-size="20" font-weight="700">AxiomRL · Three-Layer Architecture</text>
  <text x="440" y="58" text-anchor="middle" fill="#64748B" font-size="12">Each layer builds on the one below — Zoo → Contrib → Core → Environments</text>

  <!-- CLI strip -->
  <rect x="40" y="78" width="800" height="44" rx="10" fill="#E2E8F0"/>
  <text x="60" y="105" fill="#475569" font-size="11" font-weight="700" letter-spacing="2">CLI</text>
  <g fill="#0F172A" font-size="13" font-weight="500" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="180" y="105">axiomrl train</text>
    <text x="320" y="105">axiomrl eval</text>
    <text x="460" y="105">axiomrl resume</text>
    <text x="610" y="105">axiomrl zoo</text>
    <text x="730" y="105">axiomrl tune</text>
  </g>
  <path d="M440 122 L440 138" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Zoo layer -->
  <rect x="40" y="142" width="800" height="58" rx="10" fill="url(#zoo)"/>
  <text x="64" y="168" fill="#FFFFFF" font-size="15" font-weight="700">Zoo</text>
  <text x="64" y="186" fill="#FFFBEB" font-size="11">Presets · Benchmarks · Recipes</text>
  <g fill="#FFFBEB" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="260" y="170">zoo/atari/dqn_breakout.yaml</text>
    <text x="260" y="187">zoo/atari/ppo_breakout.yaml</text>
    <text x="540" y="170">zoo/mujoco/sac_halfcheetah.yaml</text>
    <text x="540" y="187">zoo/atari/benchmark.yaml</text>
  </g>
  <path d="M440 200 L440 216" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Contrib layer -->
  <rect x="40" y="220" width="800" height="50" rx="10" fill="url(#contrib)"/>
  <text x="64" y="246" fill="#FFFFFF" font-size="15" font-weight="700">Contrib</text>
  <text x="64" y="262" fill="#F5F3FF" font-size="11">Experimental extensions beyond the stable core</text>
  <g fill="#F5F3FF" font-size="12">
    <text x="500" y="248">RecurrentPPO (LSTM)</text>
    <text x="500" y="264">GAIL · Future extensions…</text>
  </g>
  <path d="M440 270 L440 286" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Core layer (largest) -->
  <rect x="40" y="290" width="800" height="160" rx="10" fill="url(#core)"/>
  <text x="64" y="316" fill="#FFFFFF" font-size="15" font-weight="700">Core</text>
  <text x="64" y="332" fill="#DBEAFE" font-size="11">Stable train / eval / resume — semver-governed surface</text>

  <!-- core sub modules -->
  <g>
    <rect x="60" y="346" width="148" height="86" rx="8" fill="#1D4ED8" opacity="0.55"/>
    <text x="134" y="370" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="700">Algorithms</text>
    <text x="134" y="390" text-anchor="middle" fill="#DBEAFE" font-size="10">PPO · DQN · SAC · TD3</text>
    <text x="134" y="406" text-anchor="middle" fill="#DBEAFE" font-size="10">BC · IQL · CQL · HER</text>
    <text x="134" y="422" text-anchor="middle" fill="#BFDBFE" font-size="10" font-style="italic">80+ implementations</text>

    <rect x="220" y="346" width="148" height="86" rx="8" fill="#1D4ED8" opacity="0.55"/>
    <text x="294" y="370" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="700">Models</text>
    <text x="294" y="390" text-anchor="middle" fill="#DBEAFE" font-size="10">MLP · CNN · LSTM</text>
    <text x="294" y="406" text-anchor="middle" fill="#DBEAFE" font-size="10">NatureCNN · Encoders</text>
    <text x="294" y="422" text-anchor="middle" fill="#BFDBFE" font-size="10" font-style="italic">Pluggable nets</text>

    <rect x="380" y="346" width="148" height="86" rx="8" fill="#1D4ED8" opacity="0.55"/>
    <text x="454" y="370" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="700">Data</text>
    <text x="454" y="390" text-anchor="middle" fill="#DBEAFE" font-size="10">ReplayBuffer · Rollout</text>
    <text x="454" y="406" text-anchor="middle" fill="#DBEAFE" font-size="10">HER · Prioritized · NPZ</text>
    <text x="454" y="422" text-anchor="middle" fill="#BFDBFE" font-size="10" font-style="italic">Buffers &amp; datasets</text>

    <rect x="540" y="346" width="148" height="86" rx="8" fill="#1D4ED8" opacity="0.55"/>
    <text x="614" y="370" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="700">Runtime</text>
    <text x="614" y="390" text-anchor="middle" fill="#DBEAFE" font-size="10">Trainer · Evaluator</text>
    <text x="614" y="406" text-anchor="middle" fill="#DBEAFE" font-size="10">Collector · Schedulers</text>
    <text x="614" y="422" text-anchor="middle" fill="#BFDBFE" font-size="10" font-style="italic">Loop orchestration</text>

    <rect x="700" y="346" width="120" height="86" rx="8" fill="#1D4ED8" opacity="0.55"/>
    <text x="760" y="370" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="700">Experiment</text>
    <text x="760" y="390" text-anchor="middle" fill="#DBEAFE" font-size="10">Config · Logging</text>
    <text x="760" y="406" text-anchor="middle" fill="#DBEAFE" font-size="10">Checkpoint · Seed</text>
    <text x="760" y="422" text-anchor="middle" fill="#BFDBFE" font-size="10" font-style="italic">Reproducibility</text>
  </g>
  <path d="M440 450 L440 466" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Env strip -->
  <rect x="40" y="470" width="800" height="36" rx="8" fill="url(#env)"/>
  <text x="64" y="493" fill="#FFFFFF" font-size="12" font-weight="700">Environments</text>
  <text x="180" y="493" fill="#ECFDF5" font-size="11">Gymnasium · VecEnv · Atari · Pixel · GoalEnv · Reward Transforms</text>
</svg>
