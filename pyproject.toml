[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rl-training"
version = "0.1.0"
description = "A reinforcement learning training package foundation."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "gymnasium",
  "numpy",
  "PyYAML",
  "tensorboard",
  "torch",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
