algo: pets
env_id: Pendulum-v1
seed: 7
total_timesteps: 5000
output_dir: runs/pets-pendulum
eval_episodes: 5
algo_kwargs:
  buffer_capacity: 100000
  batch_size: 256
  learning_starts: 1000
  train_frequency: 1
  model_hidden_sizes: [256, 256]
  model_learning_rate: 0.001
  num_ensembles: 5
  model_updates_per_step: 1
  initial_random_steps: 1000
  planning_horizon: 5
  planning_candidates: 256
  planning_topk: 32
  planning_iterations: 4
  planning_particles: 8
env_kwargs:
  max_episode_steps: 200
