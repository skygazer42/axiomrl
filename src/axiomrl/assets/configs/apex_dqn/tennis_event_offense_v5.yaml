algo: apex_dqn
env_id: ALE/Tennis-v5
seed: 53
total_timesteps: 100000000
output_dir: /raiddata/kdsoft/axiomrl-runs
device: auto
num_envs: 8
eval_episodes: 10
checkpoint_interval: 250000
tags:
  - atari
algo_kwargs:
  buffer_capacity: 300000
  batch_size: 128
  learning_starts: 20000
  train_frequency: 1
  target_update_interval: 4000
  learning_rate: 0.00005
  gamma: 0.99
  n_step: 3
  prioritized_alpha: 0.6
  prioritized_beta_start: 0.4
  prioritized_beta_end: 1.0
  prioritized_beta_fraction: 1.0
  prioritized_eps: 1.0e-6
  updates_per_collect: 1
  actor_epsilon_base: 0.4
  actor_epsilon_alpha: 7.0
  head_hidden_sizes: [512]
  features_dim: 512
  eval_interval: 100000
  early_stopping:
    metric: eval_return_mean
    mode: max
    min_steps: 20000000
    patience: 20
    min_delta: 0.5
env_kwargs:
  frameskip: 1
  full_action_space: false
  wrappers:
    atari:
      screen_size: 84
      frame_skip: 4
      noop_max: 30
      grayscale_obs: true
      frame_stack: 4
      channel_first: true
  training:
    repeat_action_probability: 0.0
    wrappers:
      atari:
        clip_reward: false
      tennis_events:
        rally_survival_bonus: 0.0
        net_cross_bonus: 0.005
        successful_return_bonus: 0.0
        failure_penalty: -0.02
        point_win_bonus: 0.14
        point_loss_penalty: 0.03
        deep_landing_bonus: 0.005
        wide_landing_bonus: 0.005
        attack_window_steps: 12
        attack_conversion_bonus: 0.1
        failed_attack_penalty: 0.03
        agent_side: left
        motion_threshold: 16.0
        min_cross_delta_x_px: 10.0
        cross_cooldown_steps: 4
        max_step_shaping_abs: 0.24
        emit_info_metrics: true
  evaluation:
    repeat_action_probability: 0.0
    wrappers:
      atari:
        clip_reward: false
