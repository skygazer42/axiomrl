algo: crossq
env_id: Pendulum-v1
seed: 7
total_timesteps: 4096
output_dir: runs
device: auto
num_envs: 1
eval_episodes: 5
algo_kwargs:
  buffer_capacity: 50000
  batch_size: 256
  learning_starts: 512
  train_frequency: 1
  hidden_sizes: [256, 256]
  critic_hidden_sizes: [512, 512]
  learning_rate: 0.001
  gamma: 0.99
  alpha: 0.1
  policy_delay: 3
  adam_beta1: 0.5
  bn_momentum: 0.99
