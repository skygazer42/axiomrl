algo: jowa
env_id: ALE/Breakout-v5
seed: 23
total_timesteps: 1000000
output_dir: runs
device: auto
num_envs: 8
eval_episodes: 5
tags:
  - atari
algo_kwargs:
  buffer_capacity: 100000
  batch_size: 32
  learning_starts: 20000
  train_frequency: 1
  target_update_interval: 2500
  learning_rate: 0.00025
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.01
  exploration_fraction: 0.2
  head_hidden_sizes: [512]
  features_dim: 512
  jowa_transition_hidden_size: 512
  jowa_action_embed_dim: 64
  jowa_reward_hidden_size: 256
  jowa_world_model_loss_coef: 1.0
  jowa_reward_loss_coef: 1.0
  jowa_reconstruction_loss_coef: 1.0
  jowa_consistency_loss_coef: 0.5
env_kwargs:
  frameskip: 1
  repeat_action_probability: 0.0
  full_action_space: false
  wrappers:
    atari:
      screen_size: 84
      frame_skip: 4
      noop_max: 30
      grayscale_obs: true
      frame_stack: 4
      clip_reward: true
      channel_first: true
