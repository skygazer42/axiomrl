algo: impala
env_id: ALE/Tennis-v5
seed: 43
total_timesteps: 3000000
output_dir: /raiddata/kdsoft/axiomrl-runs
device: auto
num_envs: 8
eval_episodes: 10
checkpoint_interval: 3000000
tags:
  - atari
algo_kwargs:
  num_steps: 128
  learning_rate: 0.0003
  ent_coef: 0.01
  vf_coef: 0.5
  gamma: 0.99
  rho_clip: 1.0
  c_clip: 1.0
  pg_rho_clip: 1.0
  max_grad_norm: 0.5
  features_dim: 512
  head_hidden_sizes: [512]
  eval_interval: 250000
  early_stopping:
    metric: eval_return_mean
    mode: max
    min_steps: 1000000
    patience: 6
    min_delta: 0.0
env_kwargs:
  frameskip: 1
  full_action_space: false
  wrappers:
    atari:
      screen_size: 84
      frame_skip: 4
      noop_max: 30
      grayscale_obs: true
      frame_stack: 4
      channel_first: true
  training:
    repeat_action_probability: 0.0
    wrappers:
      atari:
        clip_reward: true
  evaluation:
    repeat_action_probability: 0.25
    wrappers:
      atari:
        clip_reward: false
