suite: atari
protocol:
  name: atari_default_v1
  description: Deterministic ALE training with no-op reset and 4-frame stack, plus sticky-action evaluation.
  training:
    frameskip: 1
    repeat_action_probability: 0.0
  evaluation:
    frameskip: 1
    repeat_action_probability: 0.25
best_metric: eval_return_mean
best_metric_mode: max
presets:
  - name: apex_dqn_tennis_stable_lr
    config: zoo/atari/apex_dqn_tennis_stable_lr.yaml
    description: Ape-X Tennis variant with calmer optimization and slower target updates.
  - name: apex_dqn_tennis_explore_tuned
    config: zoo/atari/apex_dqn_tennis_explore_tuned.yaml
    description: Ape-X Tennis variant with stronger multi-actor exploration and replay-schedule retuning.
  - name: apex_dqn_tennis_reward_lite
    config: zoo/atari/apex_dqn_tennis_reward_lite.yaml
    description: Ape-X Tennis variant with stable optimization plus light training-only reward shaping.
  - name: rainbow_dqn_tennis_stable_lr
    config: zoo/atari/rainbow_dqn_tennis_stable_lr.yaml
    description: Rainbow Tennis variant with calmer optimization and reduced update volatility.
  - name: rainbow_dqn_tennis_no_early_stop
    config: zoo/atari/rainbow_dqn_tennis_no_early_stop.yaml
    description: Rainbow Tennis long-run variant with early stopping disabled.
  - name: rainbow_dqn_tennis_reward_lite
    config: zoo/atari/rainbow_dqn_tennis_reward_lite.yaml
    description: Rainbow Tennis variant with stable optimization plus light training-only reward shaping.
