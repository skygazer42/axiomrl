algo: ppg
env_id: CartPole-v1
seed: 7
total_timesteps: 5000
output_dir: runs
device: auto
num_envs: 2
eval_episodes: 5
algo_kwargs:
  num_steps: 128
  update_epochs: 4
  minibatch_size: 128
  hidden_sizes: [64, 64]
  learning_rate: 0.0003
  aux_learning_rate: 0.0003
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  gamma: 0.99
  gae_lambda: 0.95
  max_grad_norm: 0.5
  aux_frequency: 2
  aux_epochs: 2
  aux_minibatch_size: 128
  aux_buffer_rollouts: 4
  aux_value_coef: 1.0
  behavior_clone_coef: 1.0
  value_clone_coef: 1.0
