algo: eadream
env_id: ALE/Breakout-v5
seed: 23
total_timesteps: 300000
output_dir: runs
device: auto
num_envs: 1
eval_episodes: 5
tags:
  - atari
algo_kwargs:
  buffer_capacity: 100000
  batch_size: 32
  learning_starts: 5000
  train_frequency: 1
  world_model_updates: 1
  actor_critic_updates: 1
  imagination_batch_size: 32
  imagination_horizon: 5
  features_dim: 256
  action_embed_dim: 32
  world_model_learning_rate: 0.0003
  actor_learning_rate: 0.0001
  critic_learning_rate: 0.0001
  gamma: 0.997
  entropy_coef: 0.001
  event_hidden_sizes: [128]
  event_loss_coef: 0.5
  event_threshold: 0.01
  event_scale: 1.0
  eval_interval: 20000
env_kwargs:
  frameskip: 1
  repeat_action_probability: 0.0
  full_action_space: false
  wrappers:
    atari:
      screen_size: 84
      frame_skip: 4
      noop_max: 30
      grayscale_obs: true
      frame_stack: 4
      clip_reward: true
      channel_first: true
