name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package and quality dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff
        run: |
          python -m ruff check src/axiomrl/cli.py src/axiomrl/cli_config.py src/axiomrl/cli_doctor.py src/axiomrl/cli_zoo.py src/axiomrl/zoo/reporting.py src/axiomrl/zoo/reporting_render.py src/axiomrl/zoo/reporting_runs.py src/axiomrl/zoo/reporting_stats.py src/axiomrl/experiment/registry_actor_critic_specs.py src/axiomrl/experiment/registry_core.py src/axiomrl/experiment/registry_continuous_loaders.py src/axiomrl/experiment/registry_dqn_loaders.py src/axiomrl/experiment/registry_evaluators.py src/axiomrl/experiment/registry_offline_loaders.py src/axiomrl/experiment/registry_offline_specs.py src/axiomrl/experiment/registry_on_policy_specs.py src/axiomrl/experiment/registry_policy_loaders.py src/axiomrl/experiment/registry_predictors.py src/axiomrl/experiment/registry_recurrent_loaders.py src/axiomrl/experiment/registry_specialized_loaders.py src/axiomrl/experiment/registry_value_based_specs.py src/axiomrl/experiment/registry_world_model_specs.py tests/conftest.py tests/support/checkpoint_workflows.py tests/support/markers.py tests/support/public_api.py tests/support/runtime_foundation.py tests/test_algorithm_registry_contracts.py tests/test_checkpoint_evaluate.py tests/test_checkpoint_resume.py tests/test_cli_config.py tests/test_cli_workflows.py tests/test_cli_zoo_leaderboard.py tests/test_cli_zoo_report.py tests/test_experiment_manager_workflows.py tests/test_public_api_continuous_control.py tests/test_public_api_off_policy_suite.py tests/test_public_api_policy_gradient.py tests/test_public_api_visual_control.py tests/test_registry_internal_split.py tests/test_registry_providers.py tests/test_release_contracts.py tests/test_runtime_evaluation_support_integration.py tests/test_runtime_training_session_integration.py tests/test_test_markers.py tests/test_zoo_modules.py tests/test_zoo_reporting_split.py
          python -m ruff format --check src/axiomrl/cli.py src/axiomrl/cli_config.py src/axiomrl/cli_doctor.py src/axiomrl/cli_zoo.py src/axiomrl/zoo/reporting.py src/axiomrl/zoo/reporting_render.py src/axiomrl/zoo/reporting_runs.py src/axiomrl/zoo/reporting_stats.py src/axiomrl/experiment/registry_actor_critic_specs.py src/axiomrl/experiment/registry_core.py src/axiomrl/experiment/registry_continuous_loaders.py src/axiomrl/experiment/registry_dqn_loaders.py src/axiomrl/experiment/registry_evaluators.py src/axiomrl/experiment/registry_offline_loaders.py src/axiomrl/experiment/registry_offline_specs.py src/axiomrl/experiment/registry_on_policy_specs.py src/axiomrl/experiment/registry_policy_loaders.py src/axiomrl/experiment/registry_predictors.py src/axiomrl/experiment/registry_recurrent_loaders.py src/axiomrl/experiment/registry_specialized_loaders.py src/axiomrl/experiment/registry_value_based_specs.py src/axiomrl/experiment/registry_world_model_specs.py tests/conftest.py tests/support/checkpoint_workflows.py tests/support/markers.py tests/support/public_api.py tests/support/runtime_foundation.py tests/test_algorithm_registry_contracts.py tests/test_checkpoint_evaluate.py tests/test_checkpoint_resume.py tests/test_cli_config.py tests/test_cli_workflows.py tests/test_cli_zoo_leaderboard.py tests/test_cli_zoo_report.py tests/test_experiment_manager_workflows.py tests/test_public_api_continuous_control.py tests/test_public_api_off_policy_suite.py tests/test_public_api_policy_gradient.py tests/test_public_api_visual_control.py tests/test_registry_internal_split.py tests/test_registry_providers.py tests/test_release_contracts.py tests/test_runtime_evaluation_support_integration.py tests/test_runtime_training_session_integration.py tests/test_test_markers.py tests/test_zoo_modules.py tests/test_zoo_reporting_split.py

      - name: Run Mypy
        run: python -m mypy

  test-fast:
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run fast unit tests
        run: pytest -q -m "unit and not slow"

  test-integration:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest -q -m "integration and not slow"

  test-smoke:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run smoke tests
        run: pytest -q -m "smoke and not slow"

  build:
    runs-on: ubuntu-latest
    needs:
      - quality
      - test-fast
      - test-integration
      - test-smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build distributions
        run: python -m build --sdist --wheel

      - name: Validate distributions
        run: twine check dist/*

      - name: Smoke test built wheel
        run: |
          python -m venv .wheel-smoke
          .wheel-smoke/bin/python -m pip install --upgrade pip
          .wheel-smoke/bin/pip install dist/*.whl
          .wheel-smoke/bin/python -c "import axiomrl; print(axiomrl.__version__)"
          .wheel-smoke/bin/axiomrl --help
