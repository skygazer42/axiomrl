algo: agent57
env_id: ALE/Tennis-v5
seed: 47
total_timesteps: 10000000
output_dir: /raiddata/kdsoft/axiomrl-runs
device: auto
num_envs: 8
eval_episodes: 10
checkpoint_interval: 250000
tags:
  - atari
algo_kwargs:
  buffer_capacity: 5000
  batch_size: 32
  learning_starts: 1000
  train_frequency: 1
  target_update_interval: 2500
  learning_rate: 0.00025
  rnd_learning_rate: 0.00025
  gamma: 0.99
  features_dim: 256
  hidden_sizes: [128]
  head_hidden_sizes: [128]
  recurrent_hidden_size: 256
  recurrent_num_layers: 1
  sequence_length: 16
  epsilon_start: 1.0
  epsilon_end: 0.01
  exploration_fraction: 0.3
  prioritized_alpha: 0.6
  prioritized_beta_start: 0.4
  prioritized_beta_end: 1.0
  prioritized_beta_fraction: 1.0
  priority_eta: 0.9
  n_step: 5
  intrinsic_reward_coef: 0.1
  rnd_hidden_sizes: [256]
  rnd_embedding_dim: 128
  eval_interval: 250000
env_kwargs:
  frameskip: 1
  full_action_space: false
  wrappers:
    atari:
      screen_size: 84
      frame_skip: 4
      noop_max: 30
      grayscale_obs: true
      frame_stack: 4
      channel_first: true
  training:
    repeat_action_probability: 0.0
    wrappers:
      atari:
        clip_reward: true
  evaluation:
    repeat_action_probability: 0.25
    wrappers:
      atari:
        clip_reward: false
